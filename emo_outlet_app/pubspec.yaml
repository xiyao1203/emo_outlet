name: emo_outlet
description: 情绪出口（Emo Outlet）- AI 安全情绪释放工具
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.1.1

  # 路由
  go_router: ^14.0.0

  # 网络请求
  dio: ^5.4.0

  # 本地存储
  shared_preferences: ^2.2.2
  share_plus: ^7.2.0

  # 图表
  fl_chart: ^0.66.0

  # 响应式适配
  flutter_screenutil: ^5.9.0

  # 图标
  cupertino_icons: ^1.0.6

  # 工具类
  intl: ^0.19.0
  uuid: ^4.3.3
  path_provider: ^2.1.2
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
